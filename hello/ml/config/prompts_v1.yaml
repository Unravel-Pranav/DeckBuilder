      {{'Quarter': 'Q4 2023', 'Overall': 5.2, 'Direct': 4.5, 'Sublease': 0.7}},
      {{'Quarter': 'Q1 2024', 'Overall': 5.3, 'Direct': 4.5, 'Sublease': 0.7}},
      {{'Quarter': 'Q2 2024', 'Overall': 5.9, 'Direct': 5.1, 'Sublease': 0.8}},
      {{'Quarter': 'Q3 2024', 'Overall': 5.9, 'Direct': 5.2, 'Sublease': 0.7}},
      {{'Quarter': 'Q4 2024', 'Overall': 6.0, 'Direct': 5.2, 'Sublease': 0.8}},
      {{'Quarter': 'Q1 2025', 'Overall': 5.5, 'Direct': 5.1, 'Sublease': 0.5}},
      {{'Quarter': 'Q2 2025', 'Overall': 5.9, 'Direct': 5.3, 'Sublease': 0.6}}]

      Actual Summary 2:
      In Q2 2025 the Kansas City Industrial market reported a total availability rate of 5.9%, up 40 bps quarter-over-quarter and unchanged year-over-year, with a 20 bps decrease over the past 3 years. Direct availability was 5.3% in Q2 2025, up 20 bps quarter-over-quarter and up 20 bps year-over-year, with a 80 bps decrease over the past 3 years. Available sublease space stood at 0.6% in Q2 2025, unchanged quarter-over-quarter and a decrease 20 bps year-over-year. Sublease availability is above the 3-years quarterly average.

      ## TARGET INPUT
