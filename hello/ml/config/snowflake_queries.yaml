# Snowflake SQL Queries Configuration
# Organized by section type with parameterized queries

# Common parameters used across queries:
# - {defined_market_name}: Market identifier (e.g., 'Kansas City')
# - {publishing_group}: Property sector (e.g., 'Office')
# - {current_quarter}: Current reporting period (e.g., '2025-Q2')
# - {start_period}: Historical start period for time series
# - {qtd_absorption}: QTD absorption field name
# - {ytd_absorption}: YTD absorption field name
# - {asking_rate_field}: Asking rate field name
# - {dynamic_filters}: Additional WHERE clause filters
# - {min_transaction_size}: Minimum transaction size filter

market_overview:
  description: "Market Overview Complete Summary - combines ticker metrics and historical data"
  query: |
    -- COMBINED: Market Overview Complete Summary
    WITH latest_quarters AS (
      -- Get two most recent quarters
      SELECT period
      FROM PROD_USDM_DB.MARKET_AGGREGATED_STATS.PROPERTY_HISTORY_AGGREGATED_STATS
      WHERE defined_market_name = '{defined_market_name}'
        AND breakdown_full_desc = '*TOTAL*'
        AND publishing_group = '{publishing_group}'
        AND period <= '{current_quarter}'
      ORDER BY period DESC
      LIMIT 2
    ),
    current_metrics AS (
      -- Current quarter ticker metrics
      SELECT
        period,
        ROUND(vacant_total_percent * 100, 1) AS vacancy_rate,
        CAST({qtd_absorption} AS INT) AS net_absorption,
        under_construction_area,
        delivered_construction_area,
        ROUND({asking_rate_field}, 2) AS avg_asking_rate
      FROM PROD_USDM_DB.MARKET_AGGREGATED_STATS.PROPERTY_HISTORY_AGGREGATED_STATS
      WHERE defined_market_name = '{defined_market_name}'
        AND breakdown_full_desc = '*TOTAL*'
        AND publishing_group = '{publishing_group}'
        AND period IN (SELECT period FROM latest_quarters)
    ),
    historical_data AS (
      -- Historical time series
      SELECT
        period,
        CONCAT(SUBSTR(period,6,2),' ',SUBSTR(period,1,4)) AS period_label,
        CAST({qtd_absorption} AS INT) AS net_absorption,
        CAST(delivered_construction_area AS INT) AS deliveries,
        ROUND(vacant_total_percent * 100, 1) AS vacancy_rate
      FROM PROD_USDM_DB.MARKET_AGGREGATED_STATS.PROPERTY_HISTORY_AGGREGATED_STATS
      WHERE defined_market_name = '{defined_market_name}'
        AND breakdown_full_desc = '*TOTAL*'
        AND publishing_group = '{publishing_group}'
        AND period BETWEEN '{start_period}' AND '{current_quarter}'
    )
    -- Combine both result sets
    SELECT 'CURRENT' AS data_type, * FROM current_metrics
    UNION ALL
    SELECT 'HISTORICAL' AS data_type, period, net_absorption AS absorption,
      deliveries, vacancy_rate, NULL as under_construction_area, NULL as avg_asking_rate
    FROM historical_data
    ORDER BY period DESC;

vacancy:
  description: "Complete vacancy analysis across all breakdown levels"
  query: |
    -- COMBINED: Complete vacancy analysis
    SELECT
        CONCAT(SUBSTR(period, 6, 2), ' ', SUBSTR(period, 1, 4)) AS period_label,
        MAX(CASE WHEN property_class = '*TOTAL*' THEN ROUND(vacant_total_percent * 100, 1) END) AS Overall,
        MAX(CASE WHEN property_class = 'Class A' THEN ROUND(vacant_total_percent * 100, 1) END) AS "Class A",
        MAX(CASE WHEN property_class = 'Class B' THEN ROUND(vacant_total_percent * 100, 1) END) AS "Class B",
        -- MAX(CASE WHEN property_class = 'Class C' THEN ROUND(vacant_total_percent * 100, 1) END) AS "Class C"
    FROM PROD_USDM_DB.MARKET_AGGREGATED_STATS.PROPERTY_HISTORY_AGGREGATED_STATS
    WHERE defined_market_name = '{defined_market_name}'
        AND breakdown_full_desc IN ('*TOTAL*', 'Property Class')
        AND publishing_group = '{publishing_group}'
        AND period BETWEEN '{start_period}' AND '{current_quarter}'
        AND property_class IS NOT NULL
        AND property_class != ''
    GROUP BY period, CONCAT(SUBSTR(period, 6, 2), ' ', SUBSTR(period, 1, 4))
    ORDER BY period ASC;

asking_rent:
  description: "Complete asking rate analysis across all breakdowns"
  query: |
    -- COMBINED: Complete asking rate analysis
    SELECT
      phas.period,
      CONCAT(SUBSTR(phas.period,6,2),' ',SUBSTR(phas.period,1,4)) AS period_label,
      CASE
        WHEN phas.breakdown_full_desc = '*TOTAL*' THEN 'TOTAL'
        WHEN phas.breakdown_full_desc = 'Property Class' THEN 'BY_CLASS'
        WHEN phas.breakdown_full_desc = 'Market | Vacancy Index | Submarket' THEN 'BY_SUBMARKET'
      END AS breakdown_type,
      phas.property_class,
      phas.submarket,
      phas.net_rentable_area,
      ROUND({asking_rate_field}, 2) AS avg_asking_lease_rate_overall,
      -- Include context metrics for rate analysis
      ROUND(phas.vacant_total_percent * 100, 1) AS vacancy_rate,
      ROUND(phas.available_total_percent * 100, 1) AS availability_rate
    FROM PROD_USDM_DB.MARKET_AGGREGATED_STATS.PROPERTY_HISTORY_AGGREGATED_STATS phas
    WHERE phas.defined_market_name ILIKE '%{defined_market_name}%'
      AND phas.defined_market_sector ILIKE '%{publishing_group}%'
      AND phas.breakdown_full_desc IN ('*TOTAL*', 'Property Class', 'Market | Vacancy Index | Submarket')
      AND phas.period BETWEEN '{start_period}' AND '{current_quarter}'
      AND (phas.property_count > 0 OR phas.breakdown_full_desc = '*TOTAL*')
    ORDER BY phas.period ASC, phas.breakdown_full_desc, phas.property_class, phas.submarket;

net_absorption:
  description: "Complete absorption analysis with rolling averages"
  query: |
    -- COMBINED: Complete absorption analysis with rolling averages
    SELECT
    period,
    CONCAT(SUBSTR(period, 6, 2), ' ', SUBSTR(period, 1, 4)) AS period_label,
    property_class,
    SUM(CAST(NET_ABSORPTION_TOTAL AS INT)) AS net_absorption,
    ROUND(AVG(vacant_total_percent) * 100, 1) AS vacant_total_percent,
    ROUND(AVG(available_total_percent) * 100, 1) AS available_total_percent,
    ROUND(AVG(available_direct_percent) * 100, 1) AS available_direct_percent,
    ROUND(AVG(available_sublease_percent) * 100, 1) AS available_sublease_percent,
    SUM(under_construction_area) AS under_construction_area,
    SUM(under_construction_property_count) AS under_construction_property_count,
    SUM(delivered_construction_area) AS delivered_construction_area,
    SUM(delivered_construction_property_count) AS delivered_construction_property_count
    FROM PROD_USDM_DB.MARKET_AGGREGATED_STATS.PROPERTY_HISTORY_AGGREGATED_STATS
    WHERE defined_market_name = 'Columbus (OH) Industrial'
      AND publishing_group = 'Published National'
      AND period_year > 2024 AND period_year <= 2025 
    GROUP BY period, property_class
    ORDER BY period ASC

construction_activity:
  description: "Historical construction metrics plus current projects under construction"
  query: |
    -- COMBINED: Historical construction metrics plus current projects
    SELECT
      -- period,
      CONCAT(SUBSTR(period, 6, 2), ' ', SUBSTR(period, 1, 4)) AS Quarter,
      CAST(under_construction_area AS int) AS under_construction_area,
      CAST(delivered_construction_area AS int) AS delivered_construction_area
    FROM PROD_USDM_DB.MARKET_AGGREGATED_STATS.PROPERTY_HISTORY_AGGREGATED_STATS
    WHERE defined_market_name = '{defined_market_name}'
      AND publishing_group = '{publishing_group}'
      AND breakdown_full_desc = '*TOTAL*'
      AND period BETWEEN '{start_period}' AND '{current_quarter}'
    ORDER BY period ASC;

leasing_activity:
  description: "Complete leasing analysis with top transactions"
  query: |
    -- COMBINED: Complete leasing analysis with top transactions
    WITH lease_summary AS (
      -- Aggregate leasing activity by period and class
      SELECT
        period,
        CONCAT(SUBSTR(period,6,2),' ',SUBSTR(period,1,4)) AS period_label,
        property_class,
        lease_transaction_type,
        COUNT(*) AS transaction_count,
        CAST(SUM(leased_area) AS INT) AS total_area_leased
      FROM PROD_USDM_DB.REPORTING_ALL.AGGREGATE_TRANSACTION_DETAIL
      WHERE period BETWEEN '{start_period}' AND '{current_quarter}'
        AND {dynamic_filters}
        AND lease_transaction_type IN ('New Lease', 'Renewal')
        AND lease_record_type IN ('Lease Comp', 'Transaction', 'Partial Lease Comp')
        AND leased_area >= {min_transaction_size}
      GROUP BY period, property_class, lease_transaction_type
    ),
    lease_by_type AS (
      -- Pivot new lease vs renewal
      SELECT
        period,
        period_label,
        property_class,
        SUM(CASE WHEN lease_transaction_type = 'New Lease' THEN total_area_leased ELSE 0 END) AS new_lease_sf,
        SUM(CASE WHEN lease_transaction_type = 'Renewal' THEN total_area_leased ELSE 0 END) AS renewal_sf,
        SUM(CASE WHEN lease_transaction_type = 'New Lease' THEN transaction_count ELSE 0 END) AS new_lease_count,
        SUM(CASE WHEN lease_transaction_type = 'Renewal' THEN transaction_count ELSE 0 END) AS renewal_count,
        SUM(total_area_leased) AS total_leased_sf,
        SUM(transaction_count) AS total_lease_count
      FROM lease_summary
      GROUP BY period, period_label, property_class
    ),
    top_transactions AS (
      -- Top 10 lease transactions for current quarter
      SELECT
        period,
        period_label,
        lease_transaction_type,
        leased_area,
        tenant,
        street_address,
        submarket,
        property_class
      FROM PROD_USDM_DB.REPORTING_ALL.TOP_TRANSACTION_DETAILS
      WHERE period = '{current_quarter}'
        AND {dynamic_filters}
        AND lease_transaction_type IN ('New Lease', 'Renewal')
        AND lease_record_type IN ('Lease Comp', 'Transaction', 'Partial Lease Comp')
      ORDER BY leased_area DESC
      LIMIT 10
    )
    -- Combine summary stats with top transactions
    SELECT
      'SUMMARY' AS data_type,
      lbt.period,
      lbt.period_label,
      lbt.property_class,
      lbt.new_lease_sf,
      lbt.renewal_sf,
      lbt.new_lease_count,
      lbt.renewal_count,
      lbt.total_leased_sf,
      lbt.total_lease_count,
      NULL AS leased_area,
      NULL AS tenant,
      NULL AS street_address,
      NULL AS submarket_detail,
      NULL AS transaction_type
    FROM lease_by_type lbt
    UNION ALL
    SELECT
      'TOP_TRANSACTIONS' AS data_type,
      tt.period,
      tt.period_label,
      tt.property_class,
      NULL AS new_lease_sf,
      NULL AS renewal_sf,
      NULL AS new_lease_count,
      NULL AS renewal_count,
      NULL AS total_leased_sf,
      NULL AS total_lease_count,
      tt.leased_area,
      tt.tenant,
      tt.street_address,
      tt.submarket,
      tt.lease_transaction_type
    FROM top_transactions tt
    ORDER BY data_type, period DESC, leased_area DESC;

availability_rate: 
  description: "Complete availability and asking rate analysis"
  query: |
    -- COMBINED: Complete availability and asking rate analysis
    SELECT
        -- period,
        CONCAT(SUBSTR(period, 6, 2), ' ', SUBSTR(period, 1, 4)) AS Quarter,
        ROUND(available_total_percent * 100, 1) AS overall_availability_rate,
        ROUND(available_direct_percent * 100, 1) AS direct_availability_rate,
        ROUND(available_sublease_percent * 100, 1) AS sublease_availability_rate
    FROM PROD_USDM_DB.MARKET_AGGREGATED_STATS.PROPERTY_HISTORY_AGGREGATED_STATS
    WHERE defined_market_name = '{defined_market_name}'
        AND breakdown_full_desc = '*TOTAL*'
        AND publishing_group = '{publishing_group}'
        AND period BETWEEN '{start_period}' AND '{current_quarter}'
    ORDER BY period ASC;