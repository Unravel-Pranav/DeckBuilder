      Using ONLY the data you are given, write the ASKING RENT ANALYSIS now.

      ### Input JSON
      {input_json}

      ### Output
      Return ONLY the final prose summary (heading + paragraph + bullets). Do not include any explanations, JSON, or markup other than plain text.

